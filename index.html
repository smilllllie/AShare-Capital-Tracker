<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>核心概念 - 资金博弈排行榜</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="concept_history.js"></script>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 950px; 
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 26px;
            margin: 0;
            color: #45f3ff;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.6);
        }
        .time-display {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6);
            font-family: monospace;
        }
        
        #chart-area {
            width: 100%;
            height: 650px;
            position: relative;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        button:hover {
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.9);
            transform: scale(1.05);
        }
        
        input[type="range"] {
            flex: 1;
            min-width: 200px;
            accent-color: #4facfe;
            height: 6px;
            border-radius: 3px;
        }
        
        select {
            background: #1a1a24;
            color: #45f3ff;
            border: 1px solid #45f3ff;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
        }

        /* 移动端自适应 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .header h1 { font-size: 18px; }
            .time-display { font-size: 28px; }
            #chart-area { height: 500px; }
            .controls { flex-direction: column; align-items: stretch; }
            input[type="range"] { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 背景音乐：隐藏的音频控件 -->
    <audio id="bgMusic" loop>
        <!-- 出于浏览器安全和版权限制，无法直接外链最新的热门流行歌。我已经配置好了本地读取：请下载一首你喜欢的近期热门歌曲（比如《黑神话悟空》BGM或抖音热歌），重命名为 music.mp3 并放在当前文件夹下，即可生效！ -->
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <div class="container">
        <div class="header" style="display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
            <div style="flex: 1;">
                <div id="dateDisplay" style="font-size: 18px; font-weight: bold; color: #888; margin-bottom: 5px;"></div>
                <div class="time-display" id="timeDisplay" style="margin:0;">09:30</div>
            </div>
            <div style="flex: 1; text-align: center;">
                <h1 style="font-size: 26px; margin: 0; padding-bottom: 10px; color: #4facfe; text-shadow: 0 0 15px rgba(69, 243, 255, 0.6); border:none;">热点资金榜</h1>
            </div>
            <div style="flex: 1; text-align: right;">
                <div style="font-size: 14px; color: #888;">上证指数 <span id="shIndexChange" style="font-weight:bold;">--</span></div>
                <div id="shIndexValue" style="font-size: 24px; font-weight: bold; margin: 2px 0; color: #fff;">----.--</div>
                <div style="font-size: 14px; color: #888;">实时总净额 <span id="totalInflow" style="font-weight:bold;">--</span></div>
            </div>
        </div>
        
        <div id="chart-area"></div>
        
        <div class="controls">
            <button id="playBtn">▶ 播放</button>
            <select id="speedSelect">
                <option value="1000">0.5x 慢速</option>
                <option value="500" selected>1.0x 正常</option>
                <option value="200">2.5x 快速</option>
                <option value="50">10.0x 极速</option>
            </select>
            <input type="range" id="timeSlider" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const chartDom = document.getElementById('chart-area');
        const myChart = echarts.init(chartDom, 'dark');
        
        const fixedNames = new Set();
        if (window.HISTORY_DATA) {
            window.HISTORY_DATA.forEach(frame => {
                frame.data.forEach(item => fixedNames.add(item.name));
            });
        }
        const nameList = Array.from(fixedNames);

        let currentIntervalSpeed = 500; 

        const option = {
            backgroundColor: 'transparent',
            grid: {
                top: 40,
                bottom: 20,
                left: 30,
                right: 30,
                containLabel: true
            },
            xAxis: {
                max: function(value) { return value.max + (Math.max(value.max - value.min, 10)) * 0.25; },
                min: function(value) { return value.min < 0 ? value.min - (Math.max(value.max - value.min, 10)) * 0.25 : 0; }, 
                axisLabel: {
                    formatter: n => n.toFixed(1) + ' 亿',
                    color: '#888',
                    fontSize: 12
                },
                splitLine: {
                    show: true,
                    lineStyle: { color: 'rgba(255,255,255,0.06)' }
                }
            },
            yAxis: {
                type: 'category',
                inverse: true, 
                data: nameList,
                axisLabel: {
                    show: false
                },
                axisLine: {
                    show: true,
                    onZero: true,
                    lineStyle: { color: 'rgba(255,255,255,0.4)', width: 2 }
                },
                axisTick: { show: false },
                animationDuration: 300,
                animationDurationUpdate: 300
            },
            series: [
                {
                    name: '净额(亿元)',
                    type: 'bar',
                    z: 2,
                    barWidth: window.innerWidth < 600 ? 10 : 14,
                    data: [],
                    label: {
                        show: true,
                        valueAnimation: true,
                        formatter: function (params) {
                            const val = params.value;
                            const sign = val > 0 ? '+' : '';
                            return `${params.name}  ${sign}${val.toFixed(2)} 亿`;
                        },
                        fontSize: window.innerWidth < 600 ? 11 : 13,
                        fontWeight: 'bold',
                        color: '#fff',
                        textShadowColor: 'rgba(0,0,0,0.8)',
                        textShadowBlur: 4,
                        textBorderWidth: 0
                    },
                    itemStyle: {
                        borderRadius: 4
                    }
                }
            ],
            animationDuration: 0,
            animationDurationUpdate: currentIntervalSpeed,
            animationEasing: 'linear',
            animationEasingUpdate: 'linear'
        };

        myChart.setOption(option);

        const timeSlider = document.getElementById('timeSlider');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const speedSelect = document.getElementById('speedSelect');
        const bgMusic = document.getElementById('bgMusic');
        
        let playInterval;
        let currentIndex = 0;
        let isPlaying = false;
        const totalFrames = window.HISTORY_DATA ? window.HISTORY_DATA.length : 0;
        
        if (totalFrames > 0) {
            timeSlider.max = totalFrames - 1;
        }

        function updateFrame(index) {
            if (!window.HISTORY_DATA || index >= window.HISTORY_DATA.length) return;
            
            const frame = window.HISTORY_DATA[index];
            timeDisplay.innerText = frame.time;
            timeSlider.value = index;
            
            let totalVal = 0;
            const chartData = nameList.map(name => {
                const item = frame.data.find(x => x.name === name) || {value: 0};
                const isPositive = item.value >= 0;
                totalVal += item.value;
                return {
                    name: name,
                    value: item.value,
                    itemStyle: {
                        color: isPositive ? '#F04864' : '#2ECA8B',
                        shadowColor: isPositive ? 'rgba(240, 72, 100, 0.4)' : 'rgba(46, 202, 139, 0.4)',
                        shadowBlur: 10
                    },
                    label: {
                        position: isPositive ? 'right' : 'left'
                    }
                };
            });
            
            const totalEl = document.getElementById('totalInflow');
            if (totalEl) {
                totalEl.innerText = (totalVal > 0 ? '+' : '') + totalVal.toFixed(2) + ' 亿';
                totalEl.style.color = totalVal >= 0 ? '#F04864' : '#2ECA8B';
            }
            
            const isLastFrame = index === (window.HISTORY_DATA.length - 1);
            
            myChart.setOption({
                series: [
                    { 
                        realtimeSort: isLastFrame, // 在最后一帧自动启动排序，红绿分开
                        data: chartData 
                    }
                ]
            });
        }

        function togglePlay() {
            if (isPlaying) {
                clearInterval(playInterval);
                playBtn.innerText = '▶ 播放';
                isPlaying = false;
                bgMusic.pause(); // 暂停音乐
            } else {
                if (currentIndex >= totalFrames - 1) currentIndex = 0;
                playBtn.innerText = '⏸ 暂停';
                isPlaying = true;
                bgMusic.play().catch(e => console.log("浏览器自动播放限制或加载失败", e)); // 播放音乐
                
                currentIntervalSpeed = parseInt(speedSelect.value);
                myChart.setOption({ animationDurationUpdate: currentIntervalSpeed });
                
                playInterval = setInterval(() => {
                    currentIndex++;
                    if (currentIndex >= totalFrames) {
                        togglePlay(); 
                    } else {
                        updateFrame(currentIndex);
                    }
                }, currentIntervalSpeed); 
            }
        }

        timeSlider.addEventListener('input', (e) => {
            if (isPlaying) togglePlay();
            currentIndex = parseInt(e.target.value);
            myChart.setOption({ animationDurationUpdate: 0 });
            updateFrame(currentIndex);
        });
        
        speedSelect.addEventListener('change', (e) => {
            if (isPlaying) {
                togglePlay(); // pause
                togglePlay(); // play with new speed
            }
        });

        playBtn.addEventListener('click', togglePlay);

        if (totalFrames > 0) {
            updateFrame(0);
        } else {
            document.querySelector('.header h1').innerText = "暂无数据，请先运行收集脚本";
        }
        
        window.addEventListener('resize', () => myChart.resize());

        // 初始化日期和指数数据
        const today = new Date();
        document.getElementById('dateDisplay').innerText = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        function fetchIndex() {
            const script = document.createElement('script');
            script.src = 'https://hq.sinajs.cn/list=s_sh000001';
            script.charset = 'GBK';
            script.onload = () => {
                if (window.hq_str_s_sh000001) {
                    const parts = window.hq_str_s_sh000001.split(',');
                    if (parts.length > 3) {
                        const current = parseFloat(parts[1]).toFixed(2);
                        const change = parseFloat(parts[3]);
                        document.getElementById('shIndexValue').innerText = current;
                        const changeEl = document.getElementById('shIndexChange');
                        changeEl.innerText = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
                        changeEl.style.color = change >= 0 ? '#F04864' : '#2ECA8B';
                    }
                }
            };
            document.head.appendChild(script);
        }
        fetchIndex();
        setInterval(fetchIndex, 60000); // 每分钟更新一次大盘
    </script>
</body>
</html>
