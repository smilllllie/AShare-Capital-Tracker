<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>核心概念 - 资金博弈排行榜</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="concept_history.js"></script>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px; 
            background: rgba(15, 15, 20, 0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(69, 243, 255, 0.1);
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 26px;
            margin: 0;
            color: #45f3ff;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.6);
        }
        .time-display {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6);
            font-family: monospace;
        }
        
        #chart-area {
            width: 100%;
            height: 650px;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        button:hover {
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.9);
            transform: scale(1.05);
        }
        
        input[type="range"] {
            flex: 1;
            min-width: 200px;
            accent-color: #4facfe;
            height: 6px;
            border-radius: 3px;
        }
        
        select {
            background: #1a1a24;
            color: #45f3ff;
            border: 1px solid #45f3ff;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
        }

        /* 移动端自适应 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .header h1 { font-size: 18px; }
            .time-display { font-size: 28px; }
            #chart-area { height: 500px; }
            .controls { flex-direction: column; align-items: stretch; }
            input[type="range"] { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>盘中核心概念资金流向排行榜</h1>
            <div class="time-display" id="timeDisplay">09:30</div>
        </div>
        
        <div id="chart-area"></div>
        
        <div class="controls">
            <button id="playBtn">▶ 播放</button>
            <select id="speedSelect">
                <option value="1000">0.5x 慢速</option>
                <option value="500" selected>1.0x 正常</option>
                <option value="200">2.5x 快速</option>
                <option value="50">10.0x 极速</option>
            </select>
            <input type="range" id="timeSlider" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const chartDom = document.getElementById('chart-area');
        const myChart = echarts.init(chartDom, 'dark');
        
        const colorPalette = [
            '#ff3333', '#00ff88', '#4facfe', '#f093fb', 
            '#f5576c', '#43e97b', '#fa709a', '#fee140', 
            '#00f2fe', '#a18cd1', '#ff0844', '#b3ffab',
            '#ffb199', '#fbc2eb', '#4facfe', '#43e97b', '#f5576c', '#fee140'
        ];
        
        // 我们需要提前把所有在 JSON 里出现过的名字收集起来作为 Y 轴的固定刻度，保证动画正常
        const fixedNames = new Set();
        if (window.HISTORY_DATA) {
            window.HISTORY_DATA.forEach(frame => {
                frame.data.forEach(item => fixedNames.add(item.name));
            });
        }
        const nameList = Array.from(fixedNames);
        
        const colorMap = {};
        nameList.forEach((name, i) => colorMap[name] = colorPalette[i % colorPalette.length]);

        let currentIntervalSpeed = 500; 

        const option = {
            backgroundColor: 'transparent',
            grid: {
                top: 20,
                bottom: 20,
                left: window.innerWidth < 600 ? 90 : 120, // 移动端自适应左侧宽度
                right: 70
            },
            xAxis: {
                max: 'dataMax',
                min: 'dataMin', 
                axisLabel: {
                    formatter: n => n.toFixed(1) + ' 亿',
                    color: '#888',
                    fontSize: 12
                },
                splitLine: {
                    show: true,
                    lineStyle: { color: 'rgba(255,255,255,0.05)' }
                }
            },
            yAxis: {
                type: 'category',
                inverse: true, 
                max: 11, // 前12名展示 (0-11)
                data: nameList,
                axisLabel: {
                    show: true,
                    fontSize: window.innerWidth < 600 ? 12 : 14,
                    fontWeight: 'bold',
                    color: '#fff'
                },
                animationDuration: 300,
                animationDurationUpdate: 300
            },
            series: [{
                realtimeSort: true,
                name: '净额(亿元)',
                type: 'bar',
                data: [],
                label: {
                    show: true,
                    position: 'right',
                    valueAnimation: true,
                    formatter: function (params) {
                        const val = params.value;
                        return (val > 0 ? '+' : '') + val.toFixed(2) + ' 亿';
                    },
                    fontSize: window.innerWidth < 600 ? 12 : 15,
                    fontWeight: 'bold',
                    color: '#fff',
                    textBorderColor: '#000',
                    textBorderWidth: 2
                },
                itemStyle: {
                    borderRadius: [0, 10, 10, 0],
                    color: function(params) {
                        const baseColor = colorMap[params.name] || '#4facfe';
                        return {
                            type: 'linear',
                            x: 0, y: 0, x2: 1, y2: 0,
                            colorStops: [
                                { offset: 0, color: 'rgba(255,255,255,0.1)' },
                                { offset: 1, color: baseColor }
                            ]
                        };
                    },
                    shadowBlur: 15
                }
            }],
            animationDuration: 0,
            animationDurationUpdate: currentIntervalSpeed,
            animationEasing: 'linear',
            animationEasingUpdate: 'linear'
        };

        myChart.setOption(option);

        const timeSlider = document.getElementById('timeSlider');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const speedSelect = document.getElementById('speedSelect');
        
        let playInterval;
        let currentIndex = 0;
        let isPlaying = false;
        const totalFrames = window.HISTORY_DATA ? window.HISTORY_DATA.length : 0;
        
        if (totalFrames > 0) {
            timeSlider.max = totalFrames - 1;
        }

        function updateFrame(index) {
            if (!window.HISTORY_DATA || index >= window.HISTORY_DATA.length) return;
            
            const frame = window.HISTORY_DATA[index];
            timeDisplay.innerText = frame.time;
            timeSlider.value = index;
            
            const chartData = nameList.map(name => {
                const item = frame.data.find(x => x.name === name) || {value: 0};
                return {
                    name: name,
                    value: item.value,
                    itemStyle: {
                        shadowColor: item.value >= 0 ? 'rgba(255,51,51,0.6)' : 'rgba(0,255,136,0.6)'
                    }
                };
            });
            
            myChart.setOption({
                series: [{
                    data: chartData
                }]
            });
        }

        function togglePlay() {
            if (isPlaying) {
                clearInterval(playInterval);
                playBtn.innerText = '▶ 播放';
                isPlaying = false;
            } else {
                if (currentIndex >= totalFrames - 1) currentIndex = 0;
                playBtn.innerText = '⏸ 暂停';
                isPlaying = true;
                
                currentIntervalSpeed = parseInt(speedSelect.value);
                myChart.setOption({ animationDurationUpdate: currentIntervalSpeed });
                
                playInterval = setInterval(() => {
                    currentIndex++;
                    if (currentIndex >= totalFrames) {
                        togglePlay(); 
                    } else {
                        updateFrame(currentIndex);
                    }
                }, currentIntervalSpeed); 
            }
        }

        timeSlider.addEventListener('input', (e) => {
            if (isPlaying) togglePlay();
            currentIndex = parseInt(e.target.value);
            myChart.setOption({ animationDurationUpdate: 0 });
            updateFrame(currentIndex);
        });
        
        speedSelect.addEventListener('change', (e) => {
            if (isPlaying) {
                togglePlay(); // pause
                togglePlay(); // play with new speed
            }
        });

        playBtn.addEventListener('click', togglePlay);

        if (totalFrames > 0) {
            updateFrame(0);
        } else {
            document.querySelector('.header h1').innerText = "暂无数据，请先运行收集脚本";
        }
        
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
