name: Concept Capital Flow Auto Tracker

on:
  repository_dispatch:
    types: 
      - trigger_concept_collector  # 每10分钟触发一次数据收集
      - trigger_race_pusher        # 每天 15:05 触发一次收盘推送总结

jobs:
  track_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许自动 commit 提交 JSON 数据
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install akshare playwright requests pandas
          python -m playwright install --with-deps chromium
          
      - name: 运行 10 分钟收集器 (追加历史数据)
        if: github.event.action == 'trigger_concept_collector'
        run: |
          python concept_collector.py
          
      - name: 运行 15:05 盘后战报推送 (生成截图并 PushPlus)
        if: github.event.action == 'trigger_race_pusher'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python daily_race_pusher.py
          
      - name: 自动提交更新的 JSON 和 JS 数据文件
        if: github.event.action == 'trigger_concept_collector'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 盘中自动化：每10分钟更新概念资金流向"
          file_pattern: concept_history.json concept_history.js
